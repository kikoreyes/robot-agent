name: Build EXE

on:
  push:
    branches: [main]

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: pip install pyinstaller flask flask-cors pyngrok pyautogui pyperclip pillow
      - name: Build EXE
        run: pyinstaller --onefile --windowed --name "RobotAgent" agent.py
      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: RobotAgent-Windows
          path: dist/RobotAgent.exe

  build-mac:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: pip install pyinstaller flask flask-cors pyngrok pyautogui pyperclip pillow
      - name: Build Mac App
        run: pyinstaller --onefile --windowed --name "RobotAgent" agent.py
      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: RobotAgent-Mac
          path: dist/RobotAgent
